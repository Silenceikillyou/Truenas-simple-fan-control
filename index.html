<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fan Control</title>
<style>
  :root {
    --bg: #14161a;
    --card: #1e2126;
    --accent: #4fa3ff;
    --text: #e8e8e8;
    --muted: #8a8f98;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 24px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px 0;
  }
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .temps {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .temp-pill {
    background: var(--card);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 14px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .card {
    background: var(--card);
    border-radius: 10px;
    padding: 16px;
  }
  .card h3 {
    margin: 0 0 10px 0;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .rpm {
    font-size: 22px;
    font-weight: 600;
  }
  .rpm.stalled { color: var(--danger); }
  .mode-toggle {
    display: flex;
    gap: 6px;
    margin: 10px 0;
  }
  .mode-toggle button {
    flex: 1;
    background: #2a2e35;
    border: 1px solid #3a3f47;
    color: var(--text);
    padding: 6px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .mode-toggle button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #08131f;
  }
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }
  .pct {
    color: var(--muted);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
  }
  .note {
    color: var(--muted);
    font-size: 12px;
    margin-top: 24px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <h1>Fan Control</h1>
  <div class="sub" id="chipLine">Loading…</div>

  <div class="temps" id="temps"></div>
  <div class="grid" id="grid"></div>

  <div class="note">
    Mode "Auto" hands the channel back to the BIOS/EC thermal curve.
    Mode "Manual" lets you set a fixed duty cycle with the slider (0–255).
    RPM shown as 0 for several seconds after a change usually means the fan stalled &mdash;
    raise the value.
  </div>

<script>
async function fetchStatus() {
  const res = await fetch('/api/status');
  const data = await res.json();
  render(data);
}

function render(data) {
  document.getElementById('chipLine').textContent =
    `Chip: ${data.chip || 'unknown'} — ${data.hwmon_path}`;

  const tempsEl = document.getElementById('temps');
  tempsEl.innerHTML = '';
  for (const [label, val] of Object.entries(data.temps)) {
    const pill = document.createElement('div');
    pill.className = 'temp-pill';
    pill.textContent = `${label}: ${val}°C`;
    tempsEl.appendChild(pill);
  }

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  data.channels.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'card';

    const rpmClass = (ch.fan_rpm === 0) ? 'rpm stalled' : 'rpm';
    const pct = ch.pwm_value != null ? Math.round((ch.pwm_value / 255) * 100) : '?';

    card.innerHTML = `
      <h3>Fan ${ch.channel} <span class="${rpmClass}">${ch.fan_rpm ?? '—'} RPM</span></h3>
      <div class="mode-toggle">
        <button data-mode="2" class="${ch.pwm_enable === 2 ? 'active' : ''}">Auto</button>
        <button data-mode="1" class="${ch.pwm_enable === 1 ? 'active' : ''}">Manual</button>
      </div>
      <input type="range" min="0" max="255" value="${ch.pwm_value ?? 0}"
             ${ch.pwm_enable !== 1 ? 'disabled' : ''} data-channel="${ch.channel}">
      <div class="pct"><span>0%</span><span>${pct}%</span><span>100%</span></div>
    `;

    card.querySelectorAll('.mode-toggle button').forEach(btn => {
      btn.addEventListener('click', () => setEnable(ch.channel, parseInt(btn.dataset.mode)));
    });

    const slider = card.querySelector('input[type="range"]');
    slider.addEventListener('change', () => setValue(ch.channel, slider.value));

    grid.appendChild(card);
  });
}

async function setEnable(channel, enable) {
  await fetch(`/api/pwm/${channel}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ enable })
  });
  fetchStatus();
}

async function setValue(channel, value) {
  await fetch(`/api/pwm/${channel}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ value })
  });
  fetchStatus();
}

fetchStatus();
setInterval(fetchStatus, 3000);
</script>
</body>
</html>
